services:
  - type: web
    name: ecommerce-biess-api
    runtime: node
    plan: free
    rootDir: backend
    autoDeployTrigger: commit
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: "*"
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: PAYPHONE_API_BASE_URL
        value: https://pay.payphonetodoesposible.com/api
      - key: PAYPHONE_COUNTRY_CODE
        value: "593"
      - key: CLOUDINARY_PRODUCTS_FOLDER
        value: products
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_FROM_NAME
        value: Soporte
      - key: PASSWORD_RESET_CODE_TTL_MINUTES
        value: "15"
      - key: PASSWORD_RESET_MAX_ATTEMPTS
        value: "5"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PAYPHONE_STORE_ID
        sync: false
      - key: PAYPHONE_TOKEN
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
